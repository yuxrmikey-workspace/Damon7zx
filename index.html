<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's Tylxr🧛🏽 | Identité WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset Ultra Minimaliste */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #f5f5f5;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center; padding: 20px;
        }
        a { text-decoration: none; color: inherit; }

        /* Conteneur central (persuasif) */
        .container {
            max-width: 700px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        /* LOGO ORIGINAL (avec aura rouge) */
        .avatar-wrapper {
            position: relative; margin-bottom: 25px;
        }
        .avatar-wrapper img {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(184, 0, 0, 0.5);
            box-shadow: 0 0 40px rgba(184, 0, 0, 0.3); /* L'aura persuasive */
            background: #111; /* Fond de secours si l'image est transparente */
            transition: 0.3s;
        }
        .avatar-wrapper img:hover { box-shadow: 0 0 70px rgba(184, 0, 0, 0.6); }

        /* NOM */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem; letter-spacing: 2px; font-weight: 700;
            background: linear-gradient(135deg, #ffffff 60%, #b80000 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .tagline {
            font-weight: 300; font-style: italic; letter-spacing: 3px;
            color: #888888; font-size: 1.1rem; margin-bottom: 30px;
        }

        /* INDICATEUR LIVE (Pour persuader de la réactivité) */
        .live-pill {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(37, 211, 102, 0.08);
            border: 1px solid rgba(37, 211, 102, 0.2);
            padding: 10px 28px; border-radius: 50px; margin-bottom: 40px;
            color: #b0b0b0; font-size: 0.95rem; letter-spacing: 1px;
        }
        .live-dot {
            width: 10px; height: 10px; background: #25D366; border-radius: 50%;
            animation: pulseLive 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulseLive {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 15px #25D366; }
        }

        /* BOUTON UNIQUE ET MASSIF (Le seul appel à l'action) */
        .cta-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 15px;
            background: #b80000; color: #ffffff; 
            width: 100%; max-width: 450px; padding: 20px 30px;
            border-radius: 6px; font-weight: 600; font-size: 1.1rem;
            letter-spacing: 2px; text-transform: uppercase;
            transition: 0.3s ease; 
            box-shadow: 0 4px 30px rgba(184, 0, 0, 0.4);
            margin-bottom: 20px;
        }
        .cta-primary:hover {
            background: #8c0000; transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 40px rgba(184, 0, 0, 0.7);
        }
        .cta-primary i { font-size: 1.5rem; }

        /* NUMÉRO & FOOTER MINIMALISTE */
        .phone-number {
            color: #666666; font-weight: 400; letter-spacing: 2px; font-size: 1rem;
            margin-bottom: 40px;
        }
        .phone-number strong { color: #a0a0a0; }

        footer {
            color: #333333; font-size: 0.75rem; letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; width: 100%;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .avatar-wrapper img { width: 120px; height: 120px; }
            h1 { font-size: 2.8rem; }
            .cta-primary { padding: 16px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 1. LOGO ORIGINAL (logo.png) -->
        <div class="avatar-wrapper">
            <img src="logo.png" alt="Identité WhatsApp Tylxr">
        </div>

        <!-- 2. NOM & TAGLINE -->
        <h1>It's Tylxr🧛🏽</h1>
        <p class="tagline">"You scream, you beg and you die."</p>

        <!-- 3. INDICATEUR LIVE (Preuve de disponibilité) -->
        <div class="live-pill">
            <span class="live-dot"></span> En ligne & disponible immédiatement
        </div>

        <!-- 4. CTA UNIQUE : TOUT EST DANS CE BOUTON -->
        <a href="https://wa.me/17879684394" target="_blank" class="cta-primary">
            <i class="fab fa-whatsapp"></i> Me contacter sur WhatsApp
        </a>

        <!-- 5. NUMÉRO DE TÉLÉPHONE -->
        <div class="phone-number">
            <strong>+1 787 968 4394</strong>
        </div>

    </div>

    <!-- 6. FOOTER LÉGER -->
    <footer>
        <span>It's Tylxr🧛🏽</span> &bull; © 2026 &bull; Identité WhatsApp
    </footer>

</body>
</html>
