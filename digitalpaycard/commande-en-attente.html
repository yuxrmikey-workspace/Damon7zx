<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commande en attente – DigitalPay HT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* CSS identique à la version précédente, mais on garde le strict nécessaire */
        :root {
            --font-title: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
            --bg: #000000;
            --bg-card: #0c0c18;
            --bg-sidebar: #111123;
            --text: #ffffff;
            --text-sec: #a0a0c0;
            --text-muted: #6a6a8a;
            --orange: #f97316;
            --gradient: linear-gradient(135deg, #1a6bc4, #f97316);
            --radius: 8px;
            --border-light: rgba(255,255,255,0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-body); background:var(--bg); color:var(--text); line-height:1.5; }
        a { text-decoration:none; color:inherit; }
        img { max-width:100%; display:block; }

        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:var(--orange); border-radius:4px; }

        /* HEADER & SIDEBAR – identiques (je réutilise le même code pour gagner de la place) */
        /* ... Je vais mettre le contenu minimal pour cette page ... */

        main { width:100%; padding:0; margin:0 auto; position:relative; z-index:1; }
        .app-container { max-width:1200px; margin:0 auto; padding:0 1.2rem; width:100%; }
        .pending-message {
            text-align:center; padding:4rem 0; background:var(--glass); border-radius:var(--radius);
            border:1px solid var(--border-light); backdrop-filter:blur(6px);
        }
        .pending-message i { font-size:4rem; color:var(--orange); margin-bottom:1rem; }
        .pending-message h2 { font-family:var(--font-title); font-size:1.8rem; text-transform:uppercase; margin-bottom:0.5rem; }
        .pending-message p { font-size:1rem; color:var(--text-sec); max-width:500px; margin:0 auto; }
        .pending-message .btn-home { display:inline-block; margin-top:1.5rem; padding:0.7rem 2rem; background:var(--gradient); color:#fff; border-radius:30px; font-weight:600; text-decoration:none; }
    </style>
</head>
<body>
    <!-- Header et Sidebar identiques (je les inclus, mais tu peux les copier de la page précédente) -->
    <header>
        <a href="/home.html" class="logo"><img src="/assets/logo.png" alt="DigitalPay HT" /></a>
        <nav class="nav-links">
            <a href="/home.html">Accueil</a>
            <a href="/gaming.html">Gaming</a>
            <a href="/streaming.html">Streaming</a>
            <a href="/services-digitaux.html">Services</a>
            <a href="/echange/index.html">Échange</a>
            <a href="/giftcard/index.html">Gift Card</a>
            <a href="/digitalpaycard/index.html">DigitalPay Card</a>
        </nav>
        <div class="header-actions">
            <a href="/compte/index.html" class="auth-btn primary"><i class="fa-solid fa-user"></i> Mon compte</a>
            <button class="menu-toggle" id="menu-open"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>
    <!-- Sidebar à inclure... (je le mets dans le code final) -->

    <main>
        <div class="app-container">
            <div class="pending-message">
                <i class="fa-solid fa-clock"></i>
                <h2>Commande en attente</h2>
                <p>Votre commande de DigitalPay Card a bien été reçue. Elle est actuellement en cours de validation par notre administrateur. Vous serez notifié dès que votre carte sera active.</p>
                <a href="/home.html" class="btn-home">Retour à l'accueil</a>
            </div>
        </div>
    </main>

    <!-- Footer, scripts Firebase... (à inclure) -->
    <script>
        // Même Firebase, sidebar toggle
    </script>
</body>
</html>
